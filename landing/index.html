<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiCom Glow | The Premium Service Marketplace</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#7c5629',
                            light: '#a37b4f',
                            pale: '#eaddcc',
                            dark: '#523617'
                        },
                        bgLight: '#FCFBF8'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FCFBF8;
            color: #1a1a1a;
            overflow-x: hidden;
        }

        /* Soft Ambient Glow for Light Mode */
        .glow-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 15% 50%, rgba(124, 86, 41, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(163, 123, 79, 0.08) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Light Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(124, 86, 41, 0.05);
        }

        .btn-hover {
            transition: all 0.3s ease;
        }

        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 86, 41, 0.2);
        }

        /* Floating Animation */
        .float-slow {
            animation: float 6s ease-in-out infinite;
        }

        .float-fast {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body class="antialiased selection:bg-brand selection:text-white">

    <div id="app"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script type="module" src="/src/main.ts"></script>

</body>

</html>
